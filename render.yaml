services:
  - type: web
    name: lawbot
    env: node
    plan: free
    buildCommand: npm ci && npm run build && cp node_modules/sql.js/dist/sql-wasm.wasm dist/sql-wasm.wasm
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
